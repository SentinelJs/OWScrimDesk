<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Overwatch OBS Overlay</title>
    <!-- 폰트: 오버워치 스타일 Teko -->
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           [폰트 임포트]
           ========================================= */
        @font-face {
            font-family: 'Koverwatch';
            src: url('/fonts/koverwatch.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        /* =========================================
           [설정 영역]
           ========================================= */
        :root {
            /* 색상 커스터마이징 */
            --color-bar-bg-left: rgba(16, 16, 20, 1);   /* 왼쪽 메인 바 배경 */
            --color-bar-bg-right: rgba(16, 16, 20, 1);  /* 오른쪽 메인 바 배경 */
            --color-ban-box-bg: #222;                       /* 밴 박스 배경 */
            --color-ban-label-bg: rgba(255,0,0,0.4);                  /* BAN 라벨 배경 */
            --color-score-box-bg: #dcb043;                  /* 점수 박스 배경 (골드) */
            --color-text: white;                            /* 기본 텍스트 색 */
            
            /* 상황별 간격 커스터마이징 */
            
            /* 상황 1: 밴 + 로고 + 이름 모두 있음
               [벽] -(a)- 밴 -(b)- 로고 -(c)- 이름 */
            --gap-a: 0px;      /* 벽과 첫 요소 사이 */
            --gap-b: 7px;      /* 밴과 로고 사이 */
            --gap-c: 7px;     /* 로고와 이름 사이 */
            
            /* 상황 2: 밴만 없음 (로고 + 이름)
               [벽] -(a2)- 로고 -(c2)- 이름 */
            --gap-a2: 10px;     /* 벽과 로고 사이 */
            --gap-c2: 10px;    /* 로고와 이름 사이 */
            
            /* 상황 3: 로고만 없음 (밴 + 이름)
               [벽] -(a3)- 밴 -(c3)- 이름 */
            --gap-a3: 0px;     /* 벽과 밴 사이 */
            --gap-c3: 20px;
            /* 상황 4: 밴, 로고 모두 없음 (이름만)
               [벽] -(a4)- 이름 */
            --gap-a4: 25px;     /* 벽과 이름 사이 */
            
            /* 로고/아이콘 내부 여백 padding */
            --img-padding: 8px;
            
            /* 밴 박스 너비 조정 (기본 50px) */
            --ban-box-width: 36px;
        }

        /* 1. 기본 설정 */
        body {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            background-color: transparent; /* OBS에서 투명하게 보이도록 변경 (크로마키 대신) */
            font-family: 'Koverwatch', sans-serif;
            gap: 0; /* 초기값: gap은 개별 margin으로 제어 */
            overflow: hidden;
            box-sizing: border-box;
        }

        /* 2. 메인 UI 바 */
        .ui-bar {
            position: absolute;
            top: 11px;
            width: 526px;
            /* background: var(--color-bar-bg); -> 개별 패널에서 설정 */
            display: flex;
            align-items: center;
            color: var(--color-text);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        /* 3. 패널 위치 */
        .left-panel {
            left: 43px;
            padding-left: 0;
            background: var(--color-bar-bg-left);
        }

        .right-panel {
            right: 43px;
            padding-right: 0;
            background: var(--color-bar-bg-right)
            
        }

        /* 4. 공통 박스 (50x50) */
        .box {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0; 
            overflow: hidden;
            box-sizing: border-box;
        }

        .box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* --- 개별 요소 스타일 --- */

        /* [밴] */
        .ban-box {
            width: var(--ban-box-width);
            height: 50px;
            background-color: var(--color-ban-box-bg);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        .ban-box .hero-img {
            flex-grow: 1;
            width: 100%;
            height: 0;
        }
        .ban-box .hero-img img {
            object-fit: contain;
            object-position: center bottom;
        }
        .ban-box .ban-label {
            width: 100%;
            height: 14px;
            background-color: var(--color-ban-label-bg);
            color: var(--color-text);
            font-size: 12px;
            line-height: 14px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* [로고] */
        .logo-box {
            padding: var(--img-padding);
        }

        /* [점수] */
        .score-box {
            background-color: var(--color-score-box-bg);
            color: var(--color-text);
            font-size: 38px;
            font-weight: bold;
            line-height: 50px;
        }

        /* [공격/수비 아이콘] */
        .role-box {
            /* background-color는 JS에서 제어 */
            padding: 10px; 
        }
        
        
        /* [팀 이름] */
        .team-name {
            flex-grow: 1; 
            font-size: 28px;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* LEFT PANEL */
        .left-panel .ban-box { margin-right: var(--gap-b); }
        .left-panel .logo-box { margin-right: var(--gap-c); }
        .left-panel .team-name { 
            text-align: left;
            margin-left: 0;
        }

        /* RIGHT PANEL */
        .right-panel .logo-box { margin-left: var(--gap-c); }
        .right-panel .ban-box { margin-left: var(--gap-b); }
        .right-panel .team-name { 
            text-align: right;
            margin-right: 0;
        }

        /* [중앙 상단 공지 박스] */
        .center-notice-box {
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 470px;
            height: 20px;
            background-color: rgba(16, 16, 20, 1);
            color: white;
            display: flex;
            justify-content: space-between; /* 양쪽 끝 정렬로 변경 */
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            z-index: 100;
            padding: 0 10px; /* 좌우 10px 패딩 추가 */
            box-sizing: border-box; /* 패딩이 너비에 포함되도록 */
            white-space: pre; /* 연속된 공백 유지 */
        }

        .match-title-wrap {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }

        #match-logo-small {
            width: 16px;
            height: 16px;
            object-fit: contain;
            display: none;
            flex-shrink: 0;
        }

        /* 유틸리티: 숨김 */
        .hidden { display: none !important; }

    </style>
</head>
<body>

    <!-- 중앙 상단 공지 박스 -->
    <div class="center-notice-box">
        <span class="match-title-wrap">
            <img id="match-logo-small" src="" alt="MatchLogo">
            <span id="match-title">KHU Espers</span>
        </span>
        <span id="set-score">SET 1 ㅣ 눔바니</span>
    </div>

    <div id="left-ui" class="ui-bar left-panel">
        <div id="left-ban" class="box ban-box">
            <div class="hero-img">
                <img id="left-ban-img" src="" alt="BanHero">
            </div>
            <div class="ban-label">BAN</div>
        </div>
        <div id="left-logo" class="box logo-box">
            <img id="left-logo-img" src="" alt="Logo">
        </div>
        <div id="left-name" class="team-name"></div>
        <div id="left-score" class="box score-box"></div>
        <div id="left-role" class="box role-box">
            <!-- 아이콘은 JS로 설정 -->
            <img id="left-role-icon" src="" alt="Role">
        </div>
    </div>

    <div id="right-ui" class="ui-bar right-panel">
        <div id="right-role" class="box role-box">
            <img id="right-role-icon" src="" alt="Role">
        </div>
        <div id="right-score" class="box score-box"></div>
        <div id="right-name" class="team-name"></div>
        <div id="right-logo" class="box logo-box">
            <img id="right-logo-img" src="" alt="Logo">
        </div>
        <div id="right-ban" class="box ban-box">
            <div class="hero-img">
                <img id="right-ban-img" src="" alt="BanHero">
            </div>
            <div class="ban-label">BAN</div>
        </div>
    </div>

    <script>
        // 아이콘 URL 상수
        const ICON_ATTACK = "/img/icon/attack.png";
        const ICON_DEFEND = "/img/icon/defend.png";
        const ROLE_COLORS = {
            attack: "#e6335a",
            defense: "#02f7f8"
        };

        // CSS 변수 값 읽기
        function getCSSVariable(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

        const wsProtocol = location.protocol === "https:" ? "wss" : "ws";
        const wsHost = location.host || "localhost:3000";
        const ws = new WebSocket(`${wsProtocol}://${wsHost}`);

        ws.addEventListener("open", () => {
            ws.send(JSON.stringify({ type: "overlay:hello" }));
        });

        ws.addEventListener("message", (event) => {
            const data = JSON.parse(event.data);
            if (data.type === "overlay:update") {
                render(data.payload);
            }
        });

        ws.addEventListener("close", () => {
            setTimeout(() => location.reload(), 1500);
        });

        function render(payload) {
            if (!payload) return;
            const { settings, teams, state, score, assets } = payload;
            const safeTeams = {
                team1: { id: "team1", name: "TEAM 1", color: "#101014", logo: "", ...(teams?.team1 || {}) },
                team2: { id: "team2", name: "TEAM 2", color: "#101014", logo: "", ...(teams?.team2 || {}) }
            };
            const safeScore = {
                team1: typeof score?.team1 === "number" ? score.team1 : 0,
                team2: typeof score?.team2 === "number" ? score.team2 : 0
            };
            const safeState = state || {};
            const mapName = safeState.currentMapName || "-";
            const rawMatchName = settings?.matchName ?? "";
            document.getElementById('match-title').textContent = rawMatchName.replace(/\r?\n/g, "");
            const matchLogoEl = document.getElementById('match-logo-small');
            const matchLogo = settings?.matchLogo || "";
            if (matchLogo) {
                matchLogoEl.src = matchLogo;
                matchLogoEl.style.display = 'block';
            } else {
                matchLogoEl.src = "";
                matchLogoEl.style.display = 'none';
            }
            document.getElementById('set-score').textContent = `SET ${safeState.currentMatchIndex || 1} ㅣ ${mapName}`;

            const heroById = (id) => assets?.heroes?.find((hero) => hero.id === id);
            const team1Ban = heroById(safeState?.bans?.team1);
            const team2Ban = heroById(safeState?.bans?.team2);

            const isSideMode = safeState.currentMapMode === "hybrid" || safeState.currentMapMode === "escort";
            let attackTeam = safeState.attackTeam || "";
            if (!attackTeam && safeState.sidePickOwner && safeState.side) {
                if (safeState.side === "attack") {
                    attackTeam = safeState.sidePickOwner;
                } else if (safeState.side === "defense") {
                    attackTeam = safeState.sidePickOwner === "team1" ? "team2" : "team1";
                }
            }
            const hasAttack = attackTeam === "team1" || attackTeam === "team2";

            const layoutSwap = !!safeState.layoutSwap;
            const leftTeamId = layoutSwap ? "team2" : "team1";
            const rightTeamId = layoutSwap ? "team1" : "team2";

            const roleByTeam = {
                team1: hasAttack ? (attackTeam === "team1" ? "attack" : "defense") : "",
                team2: hasAttack ? (attackTeam === "team2" ? "attack" : "defense") : ""
            };

            const teamData = {
                team1: {
                    name: safeTeams.team1.name,
                    score: safeScore.team1,
                    banImage: team1Ban ? team1Ban.image : "",
                    logo: safeTeams.team1.logo,
                    role: roleByTeam.team1,
                    roleColor: safeTeams.team1.color
                },
                team2: {
                    name: safeTeams.team2.name,
                    score: safeScore.team2,
                    banImage: team2Ban ? team2Ban.image : "",
                    logo: safeTeams.team2.logo,
                    role: roleByTeam.team2,
                    roleColor: safeTeams.team2.color
                }
            };

            updateTeam('left', {
                ...teamData[leftTeamId],
                showBan: settings.enableHeroBan,
                showLogo: true,
                showRole: isSideMode && hasAttack
            });

            updateTeam('right', {
                ...teamData[rightTeamId],
                showBan: settings.enableHeroBan,
                showLogo: true,
                showRole: isSideMode && hasAttack
            });
        }

        function updateTeam(side, data) {
            // Team Name
            document.getElementById(`${side}-name`).textContent = data.name;
            
            // Score
            document.getElementById(`${side}-score`).textContent = data.score;
            
            // Ban
            const banBox = document.getElementById(`${side}-ban`);
            if (data.showBan && data.banImage) {
                banBox.classList.remove('hidden');
                document.getElementById(`${side}-ban-img`).src = data.banImage;
            } else {
                banBox.classList.add('hidden');
            }

            // Logo
            const logoBox = document.getElementById(`${side}-logo`);
            if (data.showLogo && data.logo) {
                logoBox.classList.remove('hidden');
                document.getElementById(`${side}-logo-img`).src = data.logo;
            } else {
                logoBox.classList.add('hidden');
            }

            // Role
            const roleBox = document.getElementById(`${side}-role`);
            if (data.showRole) {
                const roleForSide = side === "left" ? "defense" : "attack";
                roleBox.classList.remove('hidden');
                roleBox.style.backgroundColor = ROLE_COLORS[roleForSide];
                document.getElementById(`${side}-role-icon`).src = roleForSide === "attack" ? ICON_ATTACK : ICON_DEFEND;
            } else {
                roleBox.classList.add('hidden');
            }

            // 상황별 간격 설정 (매 업데이트마다 초기화 후 재설정)
            const teamNameEl = document.getElementById(`${side}-name`);
            const banEl = document.getElementById(`${side}-ban`);
            const logoEl = document.getElementById(`${side}-logo`);
            const showBan = data.showBan && data.banImage;
            const showLogo = data.showLogo && data.logo;

            // [중요] 모든 동적 마진 초기화 (덮어쓰기 방지)
            [teamNameEl, banEl, logoEl].forEach(el => {
                if(el) {
                    el.style.marginLeft = '';
                    el.style.marginRight = '';
                }
            });

            if (side === 'left') {
                /* LEFT PANEL: [Wall] -> [First] -> [Second] ... */
                if (!showBan && !showLogo) {
                    // 상황 4: [Wall] -(a4)- [Name]
                    teamNameEl.style.marginLeft = getCSSVariable('--gap-a4');
                } else if (showBan && !showLogo) {
                    // 상황 3: [Wall] -(a3)- [Ban] -(c3)- [Name]
                    banEl.style.marginLeft = getCSSVariable('--gap-a3');
                    banEl.style.marginRight = getCSSVariable('--gap-c3'); // Ban의 우측 마진 (Name과의 사이)
                } else if (!showBan && showLogo) {
                    // 상황 2: [Wall] -(a2)- [Logo] -(c2)- [Name]
                    logoEl.style.marginLeft = getCSSVariable('--gap-a2');
                    logoEl.style.marginRight = getCSSVariable('--gap-c2'); // Logo의 우측 마진 (Name과의 사이)
                } else {
                    // 상황 1: [Wall] -(a)- [Ban] -(b)- [Logo] -(c)- [Name]
                    // CSS 기본값 활용: Ban(margin-right:b), Logo(margin-right:c)
                    banEl.style.marginLeft = getCSSVariable('--gap-a');
                }
            } else {
                /* RIGHT PANEL: ... [Name] -> [Logo/Ban] -> [Ban] -> [Wall] */
                if (!showBan && !showLogo) {
                    // 상황 4: [Name] -(a4)- [Wall]
                    teamNameEl.style.marginRight = getCSSVariable('--gap-a4');
                } else if (showBan && !showLogo) {
                    // 상황 3: [Name] -(c3)- [Ban] -(a3)- [Wall]
                    // Ban의 왼쪽(Name 쪽)에 c3 적용
                    banEl.style.marginLeft = getCSSVariable('--gap-c3');
                    banEl.style.marginRight = getCSSVariable('--gap-a3');
                } else if (!showBan && showLogo) {
                    // 상황 2: [Name] -(c2)- [Logo] -(a2)- [Wall]
                    // Logo의 왼쪽(Name 쪽)에 c2 적용
                    logoEl.style.marginLeft = getCSSVariable('--gap-c2');
                    logoEl.style.marginRight = getCSSVariable('--gap-a2');
                } else {
                    // 상황 1: [Name] -(c)- [Logo] -(b)- [Ban] -(a)- [Wall]
                    // CSS 기본값 활용: Logo(margin-left:c), Ban(margin-left:b)
                    banEl.style.marginRight = getCSSVariable('--gap-a');
                }
            }
        }
    </script>
</body>
</html>
