<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OW2 Overlay</title>
  <link rel="stylesheet" href="/css/overlay.css" />
</head>
<body>
  <div class="overlay">
    <div class="team team1" id="team1">
      <img id="team1-logo" alt="team1" />
      <div>
        <div class="team-name" id="team1-name">Team 1</div>
        <div class="team-score" id="team1-score">0</div>
      </div>
    </div>
    <div class="center">
      <img id="match-logo" alt="match-logo" />
      <div class="match-name" id="match-name">OW2 Scrim</div>
      <div class="map-box">
        <img id="map-image" alt="map" />
        <div class="map-name" id="map-name">-</div>
      </div>
      <div class="bans" id="ban-area">
        <div class="ban">
          <span>밴 A</span>
          <img id="ban1-img" alt="ban1" />
        </div>
        <div class="ban">
          <span>밴 B</span>
          <img id="ban2-img" alt="ban2" />
        </div>
      </div>
    </div>
    <div class="team team2" id="team2">
      <img id="team2-logo" alt="team2" />
      <div>
        <div class="team-name" id="team2-name">Team 2</div>
        <div class="team-score" id="team2-score">0</div>
      </div>
    </div>
  </div>

  <script src="/js/overlay.js" type="module"></script>
</body>
</html>
