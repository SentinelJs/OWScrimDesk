<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hero Ban Overlay</title>
  <link rel="stylesheet" href="/css/shared-topbar.css" />
    <style>
      @font-face {
        font-family: "koverwatch";
        src: url("/fonts/koverwatch.otf") format("opentype");
        font-style: normal;
        font-weight: 400;
      }

      :root {
        --accent-left: #e6335a;
        --accent-right: #02f7f8;
        --panel-bg: transparent;
        --map-image: none;
        --center-divider-width: 5.2px;
        --center-divider-color: #111111;
      }

      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
        overflow: hidden;
      }

      .hero-ban-overlay {
        width: 100vw;
        height: 100vh;
        display: grid;
        grid-template-rows: var(--header-height) 90px 1fr 75px;
        background: var(--bg);
        position: relative;
      }

      .disabled {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        font-weight: 800;
        letter-spacing: 0.12em;
        background: rgba(0, 0, 0, 0.7);
        z-index: 5;
      }

      .loading-screen {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        font-weight: 800;
        letter-spacing: 0.08em;
        background: rgba(0, 0, 0, 0.85);
        z-index: 6;
      }

      .hero-ban-overlay.loading > *:not(.loading-screen) {
        visibility: hidden;
      }

      .main-area {
        position: relative;
        display: grid;
        grid-template-columns: 1fr var(--center-divider-width) 1fr;
        align-items: stretch;
        background-image: var(--map-image);
        background-size: cover;
        background-position: center;
        overflow: hidden;
      }

      .main-area::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        background: rgba(0, 0, 0, 0.12);
        -webkit-backdrop-filter: blur(6px);
        backdrop-filter: blur(6px);
        pointer-events: none;
      }

      .hero-panel {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        z-index: 1;
      }

      .hero-panel video {
        width: 100%;
        height: 125%;
        object-fit: cover;
        object-position: center;
        opacity: 0;
      }

      .hero-panel video.fade-in {
        animation: hero-video-fade-in 800ms ease-out forwards;
      }

      @keyframes hero-video-fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .hero-placeholder {
        position: absolute;
        font-size: calc(22px * var(--ui-font-scale));
        font-weight: 700;
        color: rgba(0, 0, 0, 0.7);
        text-align: center;
        z-index: 2;
        background: rgba(255, 255, 255, 0.6);
        padding: 12px 20px;
        border-radius: 4px;
      }

      .divider {
        background: var(--center-divider-color);
        z-index: 2;
      }

      .mode-logo {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) rotate(45deg);
        width: 50px;
        height: 50px;
        background: #1A1A1A;
        display: grid;
        place-items: center;
        z-index: 3;
      }

      .mode-logo img {
        width: 80%;
        height: 80%;
        object-fit: contain;
        transform: rotate(-45deg);
      }

      .info-bar {
        display: grid;
        grid-template-columns: 1fr 0.8fr 1fr;
        background: transparent;
        border-top: none;
        border-bottom: none;
        color: #FAFAF8;
      }

      .info-cell {
        display: grid;
        place-items: center;
        font-size: calc(26px * var(--ui-font-scale));
        text-transform: uppercase;
        border-right: none;
        letter-spacing: 0.03em;
      }

      .info-cell:last-child {
        border-right: none;
      }

      #ban-name-left,
      #ban-name-right,
      #map-name-bar {
        font-family: "koverwatch", "Pretendard", "Noto Sans KR", system-ui, sans-serif;
      }

      #map-name-bar {
        background: #FAFAF8;
        color: #1A1A1A;
      }

      .label-bar {
        display: grid;
        grid-template-columns: 1fr 1fr;
        background: rgba(255, 255, 255, 0.2);
        color: #FAFAF8;
        align-items: center;
        position: relative;
      }

      .label-bar div {
        font-size: 44px;
        font-weight: 700;
        text-align: center;
        letter-spacing: 0.04em;
      }

      .label-bar::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: 50%;
        width: var(--center-divider-width);
        transform: translateX(-50%);
        background: var(--center-divider-color);
        z-index: 2;
      }

      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div class="hero-ban-overlay loading" id="overlay">
      <div class="disabled hidden" id="disabled">HERO BAN DISABLED</div>
      <div class="loading-screen" id="loadingScreen">LOADING...</div>
      <div id="shared-topbar-slot"></div>

      <div class="label-bar">
        <div id="labelLeft">Initial Ban</div>
        <div id="labelRight">Follow-up Ban</div>
      </div>

      <div class="main-area" id="main-area">
        <div class="hero-panel">
          <video id="heroLeftVideo" autoplay loop muted playsinline></video>
        </div>
        <div class="divider"></div>
        <div class="hero-panel">
          <video id="heroRightVideo" autoplay loop muted playsinline></video>
        </div>
        <div class="mode-logo"><img id="modeLogo" alt="" /></div>
      </div>

      <div class="info-bar">
        <div class="info-cell" id="ban-name-left">Team1 Banned Hero Name</div>
        <div class="info-cell" id="map-name-bar">Map Name</div>
        <div class="info-cell" id="ban-name-right">Team2 Banned Hero Name</div>
      </div>
    </div>

    <script src="/js/shared-topbar.js"></script>
    <script>
      let ws = null;
      const overlay = document.getElementById("overlay");
      const disabled = document.getElementById("disabled");
      const loadingScreen = document.getElementById("loadingScreen");
      const sharedTopbarSlot = document.getElementById("shared-topbar-slot");
      const mainArea = document.getElementById("main-area");
      let topbar = null;

      const labelLeft = document.getElementById("labelLeft");
      const labelRight = document.getElementById("labelRight");

      const banNameLeft = document.getElementById("ban-name-left");
      const banNameRight = document.getElementById("ban-name-right");
      const mapNameBar = document.getElementById("map-name-bar");

      const heroLeftVideo = document.getElementById("heroLeftVideo");
      const heroRightVideo = document.getElementById("heroRightVideo");
      const heroLeftPlaceholder = document.getElementById("heroLeftPlaceholder");
      const heroRightPlaceholder = document.getElementById("heroRightPlaceholder");
      const modeLogo = document.getElementById("modeLogo");
      const HERO_VIDEO_START_TIME = 0.5;

      function setLoading(isLoading, text = "LOADING...") {
        overlay.classList.toggle("loading", isLoading);
        loadingScreen.textContent = text;
        loadingScreen.classList.toggle("hidden", !isLoading);
      }

      async function loadInitialSnapshot() {
        const res = await fetch("/api/overlay/snapshot", { cache: "no-store" });
        if (!res.ok) {
          throw new Error("초기 데이터를 불러오지 못했습니다.");
        }
        return res.json();
      }

      function connectOverlayWS() {
        ws = new WebSocket(`ws://${location.host}`);

        ws.addEventListener("open", () => {
          ws.send(JSON.stringify({ type: "overlay:hello" }));
        });

        ws.addEventListener("message", (event) => {
          const data = JSON.parse(event.data);
          if (data.type === "overlay:update") {
            render(data.payload);
          }
        });
      }

      function setImage(el, src) {
        if (!el) return;
        if (!src) {
          el.classList.add("hidden");
          el.removeAttribute("src");
          return;
        }
        const encoded = encodeURI(src);
        el.setAttribute("src", encoded);
        el.classList.remove("hidden");
      }

      function setVideo(el, src, fallbackTextEl) {
        if (!src) {
          el.classList.add("hidden");
          el.classList.remove("fade-in");
          el.removeAttribute("src");
          el.style.opacity = "0";
          if (fallbackTextEl) fallbackTextEl.classList.remove("hidden");
          return;
        }
        const encoded = encodeURI(src);
        if (el.getAttribute("src") !== encoded) {
          el.style.opacity = "0";
          el.classList.remove("fade-in");
          el.setAttribute("src", encoded);
          el.load();
          el.addEventListener("canplaythrough", () => {
            el.classList.remove("hidden");
            el.classList.remove("fade-in");
            void el.offsetWidth;
            el.classList.add("fade-in");
          }, { once: true });
          el.addEventListener("loadedmetadata", () => {
            const startTime = Number.isFinite(el.duration) && el.duration > HERO_VIDEO_START_TIME
              ? HERO_VIDEO_START_TIME
              : 0;
            try {
              el.currentTime = startTime;
            } catch (_) {}
          }, { once: true });
        }
        el.loop = false;
        el.onended = () => {
          const startTime = Number.isFinite(el.duration) && el.duration > HERO_VIDEO_START_TIME
            ? HERO_VIDEO_START_TIME
            : 0;
          try {
            el.currentTime = startTime;
          } catch (_) {}
          const replayPromise = el.play();
          if (replayPromise && typeof replayPromise.catch === "function") {
            replayPromise.catch(() => {});
          }
        };
        if (fallbackTextEl) fallbackTextEl.classList.add("hidden");
        const playPromise = el.play();
        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(() => {});
        }
        el.onerror = () => {
          el.classList.add("hidden");
          el.style.opacity = "0";
          if (fallbackTextEl) fallbackTextEl.classList.remove("hidden");
        };
      }

      function render(state) {
        if (!state) return;
        const settings = state.settings || {};
        disabled.classList.toggle("hidden", settings.enableHeroBan !== false);

        const teams = state.teams || {};
        const team1 = teams.team1 || { name: "Team 1", color: "#e6335a", logo: "" };
        const team2 = teams.team2 || { name: "Team 2", color: "#02f7f8", logo: "" };

        const score = state.score || { team1: 0, team2: 0 };
        topbar?.update({
          teams: {
            team1: { name: team1.name || "Team 1", logo: team1.logo || "" },
            team2: { name: team2.name || "Team 2", logo: team2.logo || "" }
          },
          score,
          settings,
          history: state.history || [],
          currentMatchIndex: state.state?.currentMatchIndex || 1
        });

        const game = state.state || {};
        const assets = state.assets || { heroes: [], maps: [] };
        const heroMap = new Map((assets.heroes || []).map((hero) => [hero.id, hero]));
        const mapMap = new Map((assets.maps || []).map((map) => [map.id, map]));

        const mapData = mapMap.get(game.currentMapId) || null;
        const mapLabel = game.currentMapName || (mapData ? mapData.name : "");
        mapNameBar.textContent = mapLabel || "MAP";
        mainArea.style.setProperty("--map-image", mapData && mapData.image
          ? `url('${encodeURI(mapData.image)}')`
          : "none");

        const mapMode = mapData ? mapData.mode : game.currentMapMode;
        const modeLogoSrc = mapMode ? `/img/icon/${mapMode === "control" ? "쟁탈" : mapMode === "hybrid" ? "하이브리드" : mapMode === "flashpoint" ? "플래시포인트" : mapMode === "push" ? "밀기" : mapMode === "escort" ? "호위" : mapMode}.png` : "";
        setImage(modeLogo, modeLogoSrc);

        const banOrder = game.banOrder || "A_FIRST";
        if (banOrder === "B_FIRST") {
          labelLeft.textContent = "Follow-up Ban";
          labelRight.textContent = "Initial Ban";
        } else {
          labelLeft.textContent = "Initial Ban";
          labelRight.textContent = "Follow-up Ban";
        }

        const banA = game.bans?.team1 || "";
        const banB = game.bans?.team2 || "";
        const heroA = banA ? heroMap.get(banA) : null;
        const heroB = banB ? heroMap.get(banB) : null;

        banNameLeft.textContent = heroA ? heroA.name : "";
        banNameRight.textContent = heroB ? heroB.name : "";

        const heroAVideo = heroA && heroA.image
          ? heroA.image.replace("/img/hero/", "/video/hero/").replace(/\.png$/i, ".webm")
          : "";
        const heroBVideo = heroB && heroB.image
          ? heroB.image.replace("/img/hero/", "/video/hero/").replace(/\.png$/i, ".webm")
          : "";

        setVideo(heroLeftVideo, heroAVideo, heroLeftPlaceholder);
        setVideo(heroRightVideo, heroBVideo, heroRightPlaceholder);
      }

      async function init() {
        setLoading(true, "LOADING...");
        try {
            topbar = await SharedTopbar.mount(sharedTopbarSlot);
          const snapshot = await loadInitialSnapshot();
          render(snapshot);
          setLoading(false);
          connectOverlayWS();
        } catch (error) {
          setLoading(true, "DATA LOADING...");
          setTimeout(init, 1200);
        }
      }

      window.addEventListener("resize", () => topbar?.fitMatchNameText());
      init();
    </script>
  </body>
</html>
